<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignalMind // Master Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar-nav">
        <div class="brand"><span>⚡ SignalMind</span></div>
        <a href="index.html" class="nav-link"><span>[01] RL AGENT</span></a>
        <a href="fixed.html" class="nav-link active"><span>[02] MASTER CONTROL</span></a>
    </nav>

    <main class="main-content">
        <section class="hud-panel" style="flex: 1; padding: 0;">
            <div style="position: absolute; top: 20px; right: 20px; z-index: 10; text-align: right;">
                <div class="panel-title" style="color:var(--neon-blue)">● LIVE SIMULATION</div>
                <div style="font-size: 0.7rem; color: #666;" id="mode-badge">MODE: MANUAL OVERRIDE</div>
            </div>

            <div class="sim-viewport" id="viewport">
                <div class="car-layer" id="car-layer"></div>
                <div class="road-layer">
                    <div class="crossing-box"></div>
                    <div class="road-arm r-north"><div class="footpath"><div class="pedestrian"></div></div><div class="footpath"><div class="pedestrian"></div></div></div>
                    <div class="road-arm r-south"><div class="footpath"><div class="pedestrian"></div></div><div class="footpath"><div class="pedestrian"></div></div></div>
                    <div class="road-arm r-east"><div class="footpath"><div class="pedestrian"></div></div><div class="footpath"><div class="pedestrian"></div></div></div>
                    <div class="road-arm r-west"><div class="footpath"><div class="pedestrian"></div></div><div class="footpath"><div class="pedestrian"></div></div></div>
                </div>
                <div class="intersection-anchor">
                    <div class="signal-badge sb-north">01</div>
                    <div class="light-housing lh-north"><div id="s1-red" class="bulb red active"></div><div id="s1-yellow" class="bulb yellow"></div><div id="s1-green" class="bulb green"></div></div>
                    <div class="signal-badge sb-south">02</div>
                    <div class="light-housing lh-south"><div id="s2-red" class="bulb red active"></div><div id="s2-yellow" class="bulb yellow"></div><div id="s2-green" class="bulb green"></div></div>
                    <div class="signal-badge sb-east">03</div>
                    <div class="light-housing lh-east"><div id="s3-red" class="bulb red active"></div><div id="s3-yellow" class="bulb yellow"></div><div id="s3-green" class="bulb green"></div></div>
                    <div class="signal-badge sb-west">04</div>
                    <div class="light-housing lh-west"><div id="s4-red" class="bulb red active"></div><div id="s4-yellow" class="bulb yellow"></div><div id="s4-green" class="bulb green"></div></div>
                </div>
            </div>

            <div style="padding: 20px; background: #08080a; border-top: 1px solid #222; display: flex; gap: 10px;">
                <button class="btn" onclick="toggleSim(true)">▶ START ENGINE</button>
                <button class="btn btn-secondary" onclick="toggleSim(false)">⏹ KILL ENGINE</button>
                <button class="btn btn-secondary" onclick="forceCrash()">💥 FORCE CRASH</button>
            </div>
        </section>

        <aside style="display: flex; flex-direction: column; overflow-y: auto; gap: 0;">
            
            <div class="mode-toggle-container">
                <div>
                    <span class="panel-title" style="color:#fff; display:block;">AUTO-SEQUENCE</span>
                    <span style="font-size:0.7rem; color:#666;">ENABLE TIMER LOOPS</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="mode-switch" onchange="switchMode(this.checked)">
                    <span class="slider-round"></span>
                </label>
            </div>

            <div class="hud-panel" style="border-top: none; border-radius: 0 0 4px 4px;">
                <div class="control-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="sig-label">01 NORTH</div>
                        <div class="manual-light-housing" id="ctrl-1">
                            <div class="manual-bulb red active" onclick="manualClick(1, 'red')" id="b1-red"></div>
                            <div class="manual-bulb yellow" onclick="manualClick(1, 'yellow')" id="b1-yellow"></div>
                            <div class="manual-bulb green" onclick="manualClick(1, 'green')" id="b1-green"></div>
                        </div>
                    </div>
                    <div class="config-row inputs-disabled" id="inp-row-1">
                        <div class="input-box"><span class="input-label">Green (s)</span><input type="number" class="micro-input" id="cfg-1-green" value="5"></div>
                        <div class="input-box"><span class="input-label">Red (s)</span><input type="number" class="micro-input" id="cfg-1-red" value="2"></div>
                    </div>
                </div>

                <div class="control-card" style="margin-top:10px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="sig-label">02 SOUTH</div>
                        <div class="manual-light-housing" id="ctrl-2">
                            <div class="manual-bulb red active" onclick="manualClick(2, 'red')" id="b2-red"></div>
                            <div class="manual-bulb yellow" onclick="manualClick(2, 'yellow')" id="b2-yellow"></div>
                            <div class="manual-bulb green" onclick="manualClick(2, 'green')" id="b2-green"></div>
                        </div>
                    </div>
                    <div class="config-row inputs-disabled" id="inp-row-2">
                        <div class="input-box"><span class="input-label">Green (s)</span><input type="number" class="micro-input" id="cfg-2-green" value="5"></div>
                        <div class="input-box"><span class="input-label">Red (s)</span><input type="number" class="micro-input" id="cfg-2-red" value="2"></div>
                    </div>
                </div>

                <div class="control-card" style="margin-top:10px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="sig-label">03 EAST</div>
                        <div class="manual-light-housing" id="ctrl-3">
                            <div class="manual-bulb red active" onclick="manualClick(3, 'red')" id="b3-red"></div>
                            <div class="manual-bulb yellow" onclick="manualClick(3, 'yellow')" id="b3-yellow"></div>
                            <div class="manual-bulb green" onclick="manualClick(3, 'green')" id="b3-green"></div>
                        </div>
                    </div>
                    <div class="config-row inputs-disabled" id="inp-row-3">
                        <div class="input-box"><span class="input-label">Green (s)</span><input type="number" class="micro-input" id="cfg-3-green" value="5"></div>
                        <div class="input-box"><span class="input-label">Red (s)</span><input type="number" class="micro-input" id="cfg-3-red" value="2"></div>
                    </div>
                </div>

                <div class="control-card" style="margin-top:10px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="sig-label">04 WEST</div>
                        <div class="manual-light-housing" id="ctrl-4">
                            <div class="manual-bulb red active" onclick="manualClick(4, 'red')" id="b4-red"></div>
                            <div class="manual-bulb yellow" onclick="manualClick(4, 'yellow')" id="b4-yellow"></div>
                            <div class="manual-bulb green" onclick="manualClick(4, 'green')" id="b4-green"></div>
                        </div>
                    </div>
                    <div class="config-row inputs-disabled" id="inp-row-4">
                        <div class="input-box"><span class="input-label">Green (s)</span><input type="number" class="micro-input" id="cfg-4-green" value="5"></div>
                        <div class="input-box"><span class="input-label">Red (s)</span><input type="number" class="micro-input" id="cfg-4-red" value="2"></div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        // --- CONSTANTS ---
        const STOP_LINE = 90;
        const LANE_OFFSET = 20; 
        const CRASH_DIST = 25;
        const OVERTAKE_SHIFT = 40;
        const MERGE_DIST = 60;

        // --- STATE ---
        let RUNNING = false;
        let AUTO_MODE = false; // The Master Toggle
        let CARS = [];
        let SIGNAL_STATE = { 1: 'red', 2: 'red', 3: 'red', 4: 'red' };
        
        // --- MODE SWITCHING ---
        function switchMode(isAuto) {
            AUTO_MODE = isAuto;
            const badge = document.getElementById('mode-badge');
            
            if (AUTO_MODE) {
                // ENABLE AUTO
                badge.innerText = "MODE: AUTOMATED SEQUENCE";
                badge.style.color = "var(--neon-green)";
                
                // Enable inputs, Disable manual bulbs
                for(let i=1; i<=4; i++) {
                    document.getElementById(`inp-row-${i}`).classList.remove('inputs-disabled');
                    document.getElementById(`ctrl-${i}`).classList.add('bulbs-locked');
                }
                
                // Start the sequencer
                runStep(1, 'GREEN'); 

            } else {
                // ENABLE MANUAL
                badge.innerText = "MODE: MANUAL OVERRIDE";
                badge.style.color = "#666";
                
                // Disable inputs, Enable bulbs
                for(let i=1; i<=4; i++) {
                    document.getElementById(`inp-row-${i}`).classList.add('inputs-disabled');
                    document.getElementById(`ctrl-${i}`).classList.remove('bulbs-locked');
                }
                
                // Reset lights to red for safety when switching back
                resetAllLights();
            }
        }

        // --- MANUAL CLICK ---
        function manualClick(id, color) {
            if (AUTO_MODE) return; // Ignore clicks if in Auto mode
            setLightState(id, color);
        }

        // --- AUTO SEQUENCER ---
        function runStep(sigId, phase) {
            if (!AUTO_MODE || !RUNNING) return; // Stop if mode switched or engine killed

            // Visual Update
            setLightState(sigId, phase.toLowerCase());

            let duration = 0;
            let nextPhase = '';
            let nextSig = sigId;

            const greenTime = (document.getElementById(`cfg-${sigId}-green`).value || 5) * 1000;
            const redTime = (document.getElementById(`cfg-${sigId}-red`).value || 2) * 1000;

            if (phase === 'GREEN') { duration = greenTime; nextPhase = 'YELLOW'; } 
            else if (phase === 'YELLOW') { duration = 2000; nextPhase = 'RED'; } 
            else if (phase === 'RED') { duration = redTime; nextPhase = 'GREEN'; nextSig = sigId + 1; if(nextSig > 4) nextSig = 1; }

            setTimeout(() => {
                if(AUTO_MODE && RUNNING) runStep(nextSig, nextPhase);
            }, duration);
        }

        // --- SHARED LIGHT LOGIC ---
        function setLightState(id, color) {
            SIGNAL_STATE[id] = color;
            ['red','yellow','green'].forEach(c => {
                const sb = document.getElementById(`b${id}-${c}`);
                const sim = document.getElementById(`s${id}-${c}`);
                
                if(c === color) {
                    sb.classList.add('active');
                    sim.classList.add('active');
                } else {
                    sb.classList.remove('active');
                    sim.classList.remove('active');
                }
            });
        }

        function resetAllLights() { [1,2,3,4].forEach(id => setLightState(id, 'red')); }
        function forceCrash() { [1,2,3,4].forEach(id => setLightState(id, 'green')); }

        // --- PHYSICS ENGINE ---
        function toggleSim(state) {
            if (state && !RUNNING) {
                RUNNING = true;
                spawnLoop();
                simLoop();
                if(AUTO_MODE) runStep(1, 'GREEN'); // Restart sequence if needed
            } else if (!state) {
                RUNNING = false;
                CARS.forEach(c => c.el.remove());
                CARS = [];
                document.querySelectorAll('.crash-marker').forEach(e => e.remove());
            }
        }

        function spawnLoop() {
            if (!RUNNING) return;
            if (Math.random() > 0.4) spawnCar();
            setTimeout(spawnLoop, 800 + Math.random() * 1000);
        }

        function spawnCar() {
            const sigId = Math.floor(Math.random() * 4) + 1;
            const map = { 1: 'north', 2: 'south', 3: 'east', 4: 'west' };
            const dir = map[sigId];
            const layer = document.getElementById('car-layer');
            const view = document.getElementById('viewport');
            const el = document.createElement('div');
            el.className = `car ${dir}`;
            layer.appendChild(el);

            const w = view.clientWidth, h = view.clientHeight;
            const cx = w/2, cy = h/2;
            let x=0, y=0, dx=0, dy=0;

            // LHD Geometry
            if (sigId===1) { x = cx + LANE_OFFSET; y = -40; dy = 3; }
            if (sigId===2) { x = cx - LANE_OFFSET; y = h + 40; dy = -3; }
            if (sigId===3) { x = w + 40; y = cy + LANE_OFFSET; dx = -3; }
            if (sigId===4) { x = -40; y = cy - LANE_OFFSET; dx = 3; }

            CARS.push({ el, x, y, dx, dy, sigId, dir, crashed: false, overtaking: false, origLane: (sigId<=2 ? x : y), mergeTarget: null });
        }

        function simLoop() {
            if (!RUNNING) return;
            const cx = document.getElementById('viewport').clientWidth / 2;
            const cy = document.getElementById('viewport').clientHeight / 2;

            CARS.forEach((car, i) => {
                if (car.crashed) return;

                let move = true;
                let distToCenter = 0;

                if (car.sigId === 1) distToCenter = cy - car.y;
                if (car.sigId === 2) distToCenter = car.y - cy;
                if (car.sigId === 3) distToCenter = car.x - cx;
                if (car.sigId === 4) distToCenter = cx - car.x;

                // Merge Back Logic
                if (car.overtaking && car.mergeTarget !== null) {
                    let passed = false;
                    if (car.sigId === 1 && car.y > car.mergeTarget) passed = true;
                    if (car.sigId === 2 && car.y < car.mergeTarget) passed = true;
                    if (car.sigId === 3 && car.x < car.mergeTarget) passed = true;
                    if (car.sigId === 4 && car.x > car.mergeTarget) passed = true;
                    if (passed) {
                        if (car.sigId <= 2) car.x = car.origLane; else car.y = car.origLane;
                        car.overtaking = false; car.mergeTarget = null; car.el.style.opacity = "1";
                    }
                }

                // Stop Logic
                const myLight = SIGNAL_STATE[car.sigId];
                const atStop = (distToCenter > 0 && distToCenter < STOP_LINE + 15 && distToCenter > STOP_LINE - 10);
                if (myLight !== 'green' && atStop && !car.overtaking) move = false;

                // Crash Logic
                if (Math.abs(distToCenter) < 40) {
                    CARS.forEach(other => {
                        if (car === other || other.crashed || car.crashed || car.dir === other.dir) return;
                        const d = Math.sqrt(Math.pow(car.x - other.x, 2) + Math.pow(car.y - other.y, 2));
                        if (d < CRASH_DIST) triggerCrash(car, other);
                    });
                }

                // Queue/Overtake
                CARS.forEach(other => {
                    if (car === other || car.crashed) return;
                    if (!car.overtaking && car.dir !== other.dir) return;
                    let d = 999;
                    if (car.sigId===1 && other.y > car.y) d = other.y - car.y;
                    if (car.sigId===2 && other.y < car.y) d = car.y - other.y;
                    if (car.sigId===3 && other.x < car.x) d = car.x - other.x;
                    if (car.sigId===4 && other.x > car.x) d = other.x - car.x;

                    if (d < 50 && d > 0) {
                        if (other.crashed && !car.overtaking && d < 60) {
                            startOvertake(car, other); move = true;
                        } else {
                            if (!car.overtaking) move = false;
                        }
                    }
                });

                if (move) { car.x += car.dx; car.y += car.dy; car.el.classList.remove('stopped'); }
                else { car.el.classList.add('stopped'); }
                car.el.style.left = car.x+'px'; car.el.style.top = car.y+'px';

                if (car.x > 2000 || car.x < -200 || car.y > 2000 || car.y < -200) { car.el.remove(); CARS.splice(i, 1); }
            });
            requestAnimationFrame(simLoop);
        }

        function triggerCrash(c1, c2) {
            c1.crashed = true; c2.crashed = true;
            c1.el.classList.add('wrecked'); c2.el.classList.add('wrecked');
            const b = document.createElement('div'); b.className = 'crash-marker'; b.innerText = '💥';
            b.style.left = ((c1.x+c2.x)/2)+'px'; b.style.top = ((c1.y+c2.y)/2)+'px';
            document.getElementById('viewport').appendChild(b);
        }

        function startOvertake(car, ob) {
            car.overtaking = true; car.el.style.opacity = "0.8";
            if(car.sigId===1) { car.x -= OVERTAKE_SHIFT; car.mergeTarget = ob.y + MERGE_DIST; }
            if(car.sigId===2) { car.x += OVERTAKE_SHIFT; car.mergeTarget = ob.y - MERGE_DIST; }
            if(car.sigId===3) { car.y -= OVERTAKE_SHIFT; car.mergeTarget = ob.x - MERGE_DIST; }
            if(car.sigId===4) { car.y += OVERTAKE_SHIFT; car.mergeTarget = ob.x + MERGE_DIST; }
        }
    </script>
</body>
</html>
