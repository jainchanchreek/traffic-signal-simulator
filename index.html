<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignalMind // RL Core</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar-nav">
        <div class="brand">
            <span>⚡ SignalMind</span>
        </div>
        <a href="index.html" class="nav-link active">
            <span>[01] RL AGENT</span>
        </a>
        <a href="fixed.html" class="nav-link">
            <span>[02] FIXED TIME</span>
        </a>
        <div style="margin-top:auto; padding-top:20px; border-top:1px solid #222;">
            <div class="metric-row" style="margin:0; border:none; font-size:0.7rem; color:#666;">
                <span>SYSTEM STATUS</span><span style="color:var(--neon-green)">ONLINE</span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="hud-panel" style="flex: 1; padding: 0;">
            <div style="position: absolute; top: 20px; right: 20px; z-index: 10; text-align: right;">
                <div class="panel-title">LIVE FEED</div>
                <div style="font-family: var(--font-code); font-size: 0.8rem; color: var(--neon-blue);">
                    EPISODE: 22 <span style="color:#444">|</span> STEP: 230
                </div>
            </div>

            <div class="sim-viewport">
                <div class="queue-box">
                    <div style="color:#555; margin-bottom:5px;">QUEUE_METRICS</div>
                    <div style="display:flex; justify-content:space-between; width:120px;"><span>NORTH</span><span class="val-green">00</span></div>
                    <div style="display:flex; justify-content:space-between; width:120px;"><span>EAST</span><span class="val-red">10</span></div>
                    <div style="display:flex; justify-content:space-between; width:120px;"><span>SOUTH</span><span class="val-green">00</span></div>
                    <div style="display:flex; justify-content:space-between; width:120px;"><span>WEST</span><span class="val-red">10</span></div>
                </div>

                <div class="road-layer">
                    <div class="crossing-box"></div>
                    
                    <div class="road-arm r-north">
                        <div class="footpath"><div class="pedestrian"></div><div class="pedestrian"></div></div>
                        <div class="footpath"><div class="pedestrian"></div></div>
                    </div>
                    <div class="road-arm r-south">
                        <div class="footpath"><div class="pedestrian"></div></div>
                        <div class="footpath"><div class="pedestrian"></div><div class="pedestrian"></div></div>
                    </div>
                    <div class="road-arm r-east">
                        <div class="footpath"><div class="pedestrian"></div><div class="pedestrian"></div></div>
                        <div class="footpath"><div class="pedestrian"></div></div>
                    </div>
                    <div class="road-arm r-west">
                        <div class="footpath"><div class="pedestrian"></div></div>
                        <div class="footpath"><div class="pedestrian"></div><div class="pedestrian"></div></div>
                    </div>
                </div>

                <div class="intersection-anchor">
                    <div class="light-housing lh-north"><div class="bulb red"></div><div class="bulb yellow"></div><div class="bulb green active"></div></div>
                    <div class="light-housing lh-south"><div class="bulb red"></div><div class="bulb yellow"></div><div class="bulb green active"></div></div>
                    <div class="light-housing lh-east"><div class="bulb red active"></div><div class="bulb yellow"></div><div class="bulb green"></div></div>
                    <div class="light-housing lh-west"><div class="bulb red active"></div><div class="bulb yellow"></div><div class="bulb green"></div></div>
                </div>
            </div>

            <div style="padding: 20px; background: #08080a; border-top: 1px solid #222; display: flex; gap: 10px;">
                <button class="btn">▶ INIT_TRAINING</button>
                <button class="btn btn-secondary">↺ RESET</button>
            </div>
        </section>

        <aside style="display: flex; flex-direction: column; gap: 30px;">
            <div class="hud-panel">
                <div class="panel-header"><span class="panel-title">TELEMETRY</span></div>
                <div class="metric-row"><span>REWARD_CUMULATIVE</span><span class="metric-value val-red">-3654.11</span></div>
                <div class="metric-row"><span>AVG_WAIT_TIME</span><span class="metric-value val-yellow">217.8s</span></div>
                <div class="metric-row"><span>THROUGHPUT</span><span class="metric-value val-blue">136</span></div>
                <div class="metric-row" style="border:none;"><span>EPSILON (ε)</span><span class="metric-value">1.000</span></div>
            </div>
            <div class="hud-panel" style="flex:1;">
                <div class="panel-header"><span class="panel-title">LOSS_FUNCTION_GRAPH</span></div>
                <div style="flex:1; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; color: #444; font-family: var(--font-code); font-size: 0.8rem;">[ RENDER_CHART_JS ]</div>
            </div>
        </aside>
    </main>
</body>
</html>
